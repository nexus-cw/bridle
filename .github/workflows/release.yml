name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    # Library-only repo — no binary artifacts. This workflow just
    # creates the GitHub release shell with auto-generated notes from
    # commits since the previous tag, so the module proxy + pkg.go.dev
    # have a discoverable release page. Tag itself is what publishes
    # the module to proxy.golang.org.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release with auto-generated notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
